version: "3.9"

services:
  chatbot:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Mount local index and docs so you don't re-embed on every container restart
      - ./faiss_index:/app/faiss_index
      - ./documents:/app/documents
    restart: unless-stopped
